name: Build Windows Executable

on:
  push:
    branches: [ "main" ] # Triggers the build whenever you push to main
  workflow_dispatch: # Allows you to trigger the build manually from GitHub

jobs:
  build:
    runs-on: windows-latest # Required to build a Windows .exe

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Replace with your Python version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # If you have a requirements.txt file, uncomment the line below:
        # pip install -r requirements.txt

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile main.py
      # Note: Replace 'main.py' with the actual name of your script.
      # '--onefile' bundles everything into a single executable.

    - name: Upload Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Executable
        path: dist/*.exe

